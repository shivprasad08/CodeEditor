services:
  redis:
    image: redis:7-alpine
    container_name: collab-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  websocket-server:
    build:
      context: ./server/services/websocket-server
      dockerfile: Dockerfile
    container_name: collab-websocket
    restart: unless-stopped
    environment:
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:5173
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    ports:
      - '5000:5000'

  submit-api:
    build:
      context: ./server/services/submit-api
      dockerfile: Dockerfile
    container_name: collab-submit-api
    restart: unless-stopped
    environment:
      PORT: 3000
      CLIENT_ORIGIN: http://localhost:5173
      REDIS_URL: redis://redis:6379
      REDIS_QUEUE_NAME: problems
    depends_on:
      - redis
    ports:
      - '3000:3000'

  worker:
    build:
      context: ./server/services
      dockerfile: worker/Dockerfile
    container_name: collab-worker
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      REDIS_QUEUE_NAME: problems
      WORKER_COUNT: 2
      CODE_TIMEOUT_MS: 60000
      CODE_RUNNER_MODE: docker
    depends_on:
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: collab-client
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      VITE_PORT: 5173
    depends_on:
      - websocket-server
      - submit-api
